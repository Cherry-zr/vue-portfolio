name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            projects/douguo/package-lock.json

      - name: Install portfolio dependencies
        run: npm ci

      - name: Build portfolio
        run: npm run build

      - name: Install Douguo dependencies
        working-directory: projects/douguo
        run: npm ci

      - name: Build Douguo
        working-directory: projects/douguo
        env:
          VITE_API_BASE_URL: https://apis.netstart.cn/douguo
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p dist/douguo
          cp -R projects/douguo/dist/. dist/douguo/
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
